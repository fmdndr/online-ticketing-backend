
services:
  # ── PostgreSQL ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ticketing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketing_payments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ticketing-net

  # ── MongoDB ────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: ticketing-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ticketing-net

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ticketing-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ticketing-net

  # ── RabbitMQ ───────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ticketing-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ticketing-net

  # ── Seq (Centralized Logging) ──────────────────────
  seq:
    image: datalust/seq:latest
    container_name: ticketing-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "admin123!"
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq_data:/data
    networks:
      - ticketing-net

  # ── Catalog Service ────────────────────────────────
  catalog-api:
    build:
      context: .
      dockerfile: src/Services/Catalog/Catalog.API/Dockerfile
    container_name: ticketing-catalog
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      DatabaseSettings__ConnectionString: "mongodb://mongo:27017"
      DatabaseSettings__DatabaseName: CatalogDb
      DatabaseSettings__CollectionName: Events
      Serilog__WriteTo__1__Args__serverUrl: "http://seq:5341"
    ports:
      - "5001:8080"
    depends_on:
      - mongo
      - seq
    networks:
      - ticketing-net

  # ── Basket Service ─────────────────────────────────
  basket-api:
    build:
      context: .
      dockerfile: src/Services/Basket/Basket.API/Dockerfile
    container_name: ticketing-basket
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Redis__ConnectionString: "redis:6379"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      Serilog__WriteTo__1__Args__serverUrl: "http://seq:5341"
    ports:
      - "5002:8080"
    depends_on:
      - redis
      - rabbitmq
      - seq
    networks:
      - ticketing-net

  # ── Payment Service ────────────────────────────────
  payment-api:
    build:
      context: .
      dockerfile: src/Services/Payment/Payment.API/Dockerfile
    container_name: ticketing-payment
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PaymentDb: "Host=postgres;Port=5432;Database=ticketing_payments;Username=postgres;Password=postgres"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      Serilog__WriteTo__1__Args__serverUrl: "http://seq:5341"
    ports:
      - "5003:8080"
    depends_on:
      - postgres
      - rabbitmq
      - seq
    networks:
      - ticketing-net

  # ── Gateway ────────────────────────────────────────
  gateway-api:
    build:
      context: .
      dockerfile: src/Gateway/Gateway.API/Dockerfile
    container_name: ticketing-gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5010:8080"
    depends_on:
      - catalog-api
      - basket-api
      - payment-api
    networks:
      - ticketing-net

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
  seq_data:

networks:
  ticketing-net:
    driver: bridge
