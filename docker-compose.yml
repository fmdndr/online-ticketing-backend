
services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ticketing-net

  mongo:
    image: mongo:7
    container_name: ticketing-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ticketing-net

  redis:
    image: redis:7-alpine
    container_name: ticketing-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ticketing-net

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: ticketing-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ticketing-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ticketing-kafka-ui
    restart: unless-stopped
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8082:8080"
    depends_on:
      - kafka
    networks:
      - ticketing-net

  seq:
    image: datalust/seq:latest
    container_name: ticketing-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD}
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq_data:/data
    networks:
      - ticketing-net

  catalog-api:
    build:
      context: .
      dockerfile: src/Services/Catalog/Catalog.API/Dockerfile
    container_name: ticketing-catalog
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      DatabaseSettings__ConnectionString: "mongodb://mongo:27017"
      DatabaseSettings__DatabaseName: CatalogDb
      DatabaseSettings__CollectionName: Events
      Jwt__PublicKeyPath: "/app/keys/rsa-public.pem"
      Serilog__WriteTo__1__Args__serverUrl: "http://seq:5341"
    ports:
      - "5001:8080"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      - mongo
      - seq
    networks:
      - ticketing-net

  basket-api:
    build:
      context: .
      dockerfile: src/Services/Basket/Basket.API/Dockerfile
    container_name: ticketing-basket
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Redis__ConnectionString: "redis:6379"
      Kafka__BootstrapServers: "kafka:9092"
      Jwt__PublicKeyPath: "/app/keys/rsa-public.pem"
      Serilog__WriteTo__1__Args__serverUrl: "http://seq:5341"
    ports:
      - "5002:8080"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      - redis
      - kafka
      - seq
    networks:
      - ticketing-net

  payment-api:
    build:
      context: .
      dockerfile: src/Services/Payment/Payment.API/Dockerfile
    container_name: ticketing-payment
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PaymentDb: ${PAYMENT_DB_CONNECTION}
      Kafka__BootstrapServers: "kafka:9092"
      Jwt__PublicKeyPath: "/app/keys/rsa-public.pem"
      Serilog__WriteTo__1__Args__serverUrl: "http://seq:5341"
    ports:
      - "5003:8080"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      - postgres
      - kafka
      - seq
    networks:
      - ticketing-net

  identity-api:
    build:
      context: .
      dockerfile: src/Services/Identity/Identity.API/Dockerfile
    container_name: ticketing-identity
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__IdentityDb: ${IDENTITY_DB_CONNECTION}
      Jwt__PublicKeyPath: "/app/keys/rsa-public.pem"
      Jwt__PrivateKeyPath: "/app/keys/rsa-private.pem"
      Serilog__WriteTo__1__Args__serverUrl: "http://seq:5341"
    ports:
      - "5004:8080"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      - postgres
      - seq
    networks:
      - ticketing-net

  gateway-api:
    build:
      context: .
      dockerfile: src/Gateway/Gateway.API/Dockerfile
    container_name: ticketing-gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Jwt__PublicKeyPath: "/app/keys/rsa-public.pem"
    ports:
      - "5010:8080"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      - catalog-api
      - basket-api
      - payment-api
      - identity-api
    networks:
      - ticketing-net

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data:
  seq_data:

networks:
  ticketing-net:
    driver: bridge
