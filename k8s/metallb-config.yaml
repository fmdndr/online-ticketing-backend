
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: ticketing-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.1.200-192.168.1.200   # ← replace with your chosen free LAN IP
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: ticketing-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - ticketing-pool
