apiVersion: v1
kind: Secret
metadata:
  name: ticketing-secrets
  labels:
    app.kubernetes.io/part-of: ticketing
type: Opaque
# ============================================================================
# IMPORTANT: These are placeholder values for development.
# In production, manage secrets via Rancher UI / External Secrets / Sealed Secrets.
# Values must be base64-encoded: echo -n 'value' | base64
# ============================================================================
stringData:
  # PostgreSQL (Payment service)
  ConnectionStrings__PaymentDb: "Host=postgres;Port=5432;Database=ticketing_payments;Username=postgres;Password=postgres"

  # MongoDB (Catalog service)
  DatabaseSettings__ConnectionString: "mongodb://mongo:27017"

  # PostgreSQL admin credentials (used by the postgres StatefulSet)
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_DB: "ticketing_payments"

