apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NOTE: Do NOT use commonLabels here — it injects into
# Deployment.spec.selector.matchLabels which are immutable.
# Labels are defined directly in each manifest instead.

resources:
  # Namespace
  - namespace.yaml
  # Config & Secrets
  - configmap.yaml
  # NOTE: secret.yaml is NOT deployed from git.
  # Create 'ticketing-secrets' manually in Rancher UI before first deploy.
  # See secret.yaml.example for the required keys and structure.
  # MetalLB IP pool (bare-metal LoadBalancer — requires MetalLB to be installed first)
  - metallb-config.yaml
  # Infrastructure
  - postgres-external.yaml
  - mongo.yaml
  - redis.yaml
  - rabbitmq.yaml
  - seq.yaml
  # Application Services
  - catalog-deployment.yaml
  - catalog-service.yaml
  - basket-deployment.yaml
  - basket-service.yaml
  - payment-deployment.yaml
  - payment-service.yaml
  - gateway-deployment.yaml
  - gateway-service.yaml
  # Ingress
  - ingress.yaml

