apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NOTE: Do NOT use commonLabels here — it injects into
# Deployment.spec.selector.matchLabels which are immutable.
# Labels are defined directly in each manifest instead.

resources:
  # Namespace
  - namespace.yaml
  # Config & Secrets
  - configmap.yaml
  # NOTE: secret.yaml is NOT deployed from git.
  # Create 'ticketing-secrets' manually in Rancher UI before first deploy.
  # See secret.yaml.example for the required keys and structure.
  # MetalLB IP pool — NOTE: applied separately via k8s/metallb-config.yaml
  # Do NOT include here; Kustomize's namespace override would move it out of metallb-system.
  # Infrastructure
  - postgres-external.yaml
  - mongo.yaml
  - redis.yaml
  - rabbitmq.yaml
  - seq.yaml
  # Application Services
  - catalog-deployment.yaml
  - catalog-service.yaml
  - basket-deployment.yaml
  - basket-service.yaml
  - payment-deployment.yaml
  - payment-service.yaml
  - gateway-deployment.yaml
  - gateway-service.yaml
  # Ingress is NOT used — Nginx Proxy Manager (NPM) handles reverse proxying
  # externally. NPM routes to gateway-api via NodePort 30080.
  # The ingress.yaml file is kept for reference only.


