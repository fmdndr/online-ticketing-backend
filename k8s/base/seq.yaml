# ── Seq Deployment (Centralized Logging) ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seq
  labels:
    app.kubernetes.io/name: seq
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: ticketing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: seq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seq
        app.kubernetes.io/component: logging
        app.kubernetes.io/part-of: ticketing
    spec:
      containers:
        - name: seq
          image: datalust/seq:latest
          ports:
            - name: ingestion
              containerPort: 5341
            - name: ui
              containerPort: 80
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: SEQ_FIRSTRUN_ADMINPASSWORD
              value: "admin123!"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: seq-data
              mountPath: /data
      volumes:
        - name: seq-data
          persistentVolumeClaim:
            claimName: seq-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seq-pvc
  labels:
    app.kubernetes.io/name: seq
    app.kubernetes.io/part-of: ticketing
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
# ── Seq Service ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: seq
  labels:
    app.kubernetes.io/name: seq
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: ticketing
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: seq
  ports:
    - name: ingestion
      port: 5341
      targetPort: ingestion
    - name: ui
      port: 80
      targetPort: ui

