apiVersion: v1
kind: Service
metadata:
  name: gateway-api
  labels:
    app.kubernetes.io/name: gateway-api
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: ticketing
  annotations:
    # MetalLB static external IP — set this to a free IP on your LAN (must be in the IPAddressPool you configure).
    metallb.universe.tf/loadBalancerIPs: "192.168.1.200"   # ← must match the IP in metallb-config.yaml
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: gateway-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP

