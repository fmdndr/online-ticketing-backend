apiVersion: v1
kind: Service
metadata:
  name: gateway-api
  labels:
    app.kubernetes.io/name: gateway-api
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: ticketing
  annotations:
    # Uncomment and set a specific IP if your cloud/Rancher supports static LoadBalancer IPs:
    # metallb.universe.tf/loadBalancerIPs: "192.168.1.100"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: gateway-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

