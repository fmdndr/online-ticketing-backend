apiVersion: v1
kind: Service
metadata:
  name: gateway-api
  labels:
    app.kubernetes.io/name: gateway-api
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: ticketing
  annotations:
    # MetalLB static external IP — set this to the LAN/VIP address you want Nginx Proxy Manager to forward to.
    # Replace 192.168.1.100 with the actual free IP on your MetalLB address pool.
    metallb.universe.tf/loadBalancerIPs: "192.168.1.100"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: gateway-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

