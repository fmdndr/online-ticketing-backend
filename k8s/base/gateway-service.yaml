apiVersion: v1
kind: Service
metadata:
  name: gateway-api
  labels:
    app.kubernetes.io/name: gateway-api
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: ticketing
spec:
  # NodePort — exposes the gateway on every cluster node at a fixed port.
  # Nginx Proxy Manager (NPM) proxies to <node-IP>:<nodePort>.
  type: NodePort
  selector:
    app.kubernetes.io/name: gateway-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30880    # Fixed port — configure NPM to proxy to this
      protocol: TCP
