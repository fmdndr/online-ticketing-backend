apiVersion: v1
kind: ConfigMap
metadata:
  name: ticketing-config
  labels:
    app.kubernetes.io/part-of: ticketing
data:
  # ASP.NET Core
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"

  # ── PostgreSQL (remote server — non-sensitive host info) ──────────────────
  # The actual credentials are in 'ticketing-secrets' managed via Rancher UI.
  # This host value is also used in postgres-external.yaml Endpoints.
  POSTGRES_HOST: "84.247.134.65"   # ← replace with your remote PostgreSQL IP
  POSTGRES_PORT: "5432"

  # ── MongoDB (Catalog) ──────────────────────────────────────────────────────
  DatabaseSettings__DatabaseName: "CatalogDb"
  DatabaseSettings__CollectionName: "Events"

  # Kafka (message broker)
  Kafka__BootstrapServers: "kafka:9092"

  # Redis (Basket)
  Redis__ConnectionString: "redis:6379"

  # Seq (Centralized Logging)
  Serilog__WriteTo__1__Args__serverUrl: "http://seq:5341"

