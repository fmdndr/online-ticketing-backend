# ── NOT DEPLOYED — Reference Only ──────────────────────────────────────────────
# This Ingress resource is NOT included in kustomization.yaml.
# External routing is handled by Nginx Proxy Manager (NPM) instead.
#
# NPM configuration:
#   Domain:  prod.socratic-event.com
#   Scheme:  http
#   Forward: <node-IP>:30080  (gateway-api NodePort)
#   SSL:     Managed by NPM or Cloudflare
#
# This file is kept for reference in case you switch to a K8s-native
# Ingress Controller (Traefik, NGINX) in the future.
# ───────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticketing-gateway
  labels:
    app.kubernetes.io/name: gateway-api
    app.kubernetes.io/part-of: ticketing
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: prod.socratic-event.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-api
                port:
                  number: 80
