apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticketing-gateway
  labels:
    app.kubernetes.io/name: gateway-api
    app.kubernetes.io/part-of: ticketing
  annotations:
    # Works with both nginx-ingress and Traefik (RKE2/K3s default)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # cert-manager: automatically provision & renew TLS certificates via Let's Encrypt.
    # Requires cert-manager + a ClusterIssuer named "letsencrypt-prod" installed in the cluster.
    # Remove this annotation if managing TLS secrets manually.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: prod.socratic-event.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-api
                port:
                  number: 8080
  tls:
    - hosts:
        - prod.socratic-event.com
      secretName: ticketing-tls

