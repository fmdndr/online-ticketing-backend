
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ticketing
spec:
  type: ClusterIP
  clusterIP: None    # headless — resolves directly to Endpoints below
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: postgres   # must match the Service name above
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ticketing
subsets:
  - addresses:
      - ip: 84.247.134.65   # ← replace with your remote PostgreSQL IP
    ports:
      - name: postgres
        port: 5432
        protocol: TCP
