apiVersion: v1
kind: Service
metadata:
  name: catalog-api
  labels:
    app.kubernetes.io/name: catalog-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ticketing
spec:
  type: ClusterIP
  # Static ClusterIP — within service CIDR (10.96.0.0/12). Do NOT change after first apply.
  clusterIP: 10.96.1.1
  selector:
    app.kubernetes.io/name: catalog-api
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP

