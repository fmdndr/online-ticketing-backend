apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: online-ticketing-backend

resources:
  - ../../base
  - hpa.yaml

images:
  - name: docker.io/fmdx/ticketing-catalog
    newTag: prod-latest
  - name: docker.io/fmdx/ticketing-basket
    newTag: prod-latest
  - name: docker.io/fmdx/ticketing-payment
    newTag: prod-latest
  - name: docker.io/fmdx/ticketing-gateway
    newTag: prod-latest
  - name: docker.io/fmdx/ticketing-identity
    newTag: prod-latest

replicas:
  - name: catalog-api
    count: 1
  - name: basket-api
    count: 1
  - name: payment-api
    count: 1
  - name: gateway-api
    count: 1
  - name: identity-api
    count: 1

patches:
  - target:
      kind: Namespace
      name: online-ticketing-backend
    patch: |-
      - op: add
        path: /metadata/labels/environment
        value: prod
  - target:
      kind: Deployment
      name: catalog-api
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "768Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: add
        path: /spec/template/metadata/annotations
        value:
          cluster-autoscaler.kubernetes.io/safe-to-evict: "true"

  - target:
      kind: Deployment
      name: basket-api
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "768Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: add
        path: /spec/template/metadata/annotations
        value:
          cluster-autoscaler.kubernetes.io/safe-to-evict: "true"

  - target:
      kind: Deployment
      name: payment-api
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "768Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: add
        path: /spec/template/metadata/annotations
        value:
          cluster-autoscaler.kubernetes.io/safe-to-evict: "true"

  - target:
      kind: Deployment
      name: gateway-api
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: add
        path: /spec/template/metadata/annotations
        value:
          cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
  - target:
      kind: Service
      name: gateway-api
    patch: |
      - op: add
        path: /spec/clusterIP
        value: "10.43.240.101"

  - target:
      kind: Service
      name: catalog-api
    patch: |
      - op: add
        path: /spec/clusterIP
        value: "10.43.240.102"

  - target:
      kind: Service
      name: basket-api
    patch: |
      - op: add
        path: /spec/clusterIP
        value: "10.43.240.103"

  - target:
      kind: Service
      name: payment-api
    patch: |
      - op: add
        path: /spec/clusterIP
        value: "10.43.240.104"

  - target:
      kind: Service
      name: identity-api
    patch: |
      - op: add
        path: /spec/clusterIP
        value: "10.43.240.105"

  - target:
      kind: Deployment
      name: identity-api
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "768Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: add
        path: /spec/template/metadata/annotations
        value:
          cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
